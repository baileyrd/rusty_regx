name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Format, lint, test
    runs-on: ubuntu-latest
    # A hard timeout backstops the linear-time guarantee: if an adversarial
    # pattern test ever hangs, CI fails instead of spinning.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup update stable && rustup default stable
      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --all-targets
      - name: Docs
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  fuzz:
    name: Fuzz (smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Install nightly Rust
        run: rustup update nightly && rustup default nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      # A short smoke run per target on every change; real coverage comes
      # from longer local runs (`cargo +nightly fuzz run <target>`).
      - name: Fuzz each target briefly
        run: |
          for target in parse exec differential; do
            cargo fuzz run "$target" -- -max_total_time=60 -max_len=512
          done
