name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Format, lint, test
    runs-on: ubuntu-latest
    # A hard timeout backstops the linear-time guarantee: if an adversarial
    # pattern test ever hangs, CI fails instead of spinning.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup update stable && rustup default stable
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --all-targets
      - name: Docs
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      # Proves the crate packages for crates.io (manifest, file list,
      # readme path) without the slow verify build.
      - name: Package check
        run: cargo package --no-verify
      # Informational: prints the comparison table against the regex
      # crate into the run log, so perf regressions are visible in
      # review without asserting on noisy shared-runner timings.
      - name: Benchmarks
        run: cargo bench

  # The declared MSRV (Cargo.toml rust-version) is a promise; the code even
  # carries manual workarounds for it (map_or over is_none_or in vm.rs).
  # This job is what stops an accidental newer-Rust idiom from landing.
  msrv:
    name: MSRV (1.75)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install MSRV Rust
        run: rustup toolchain install 1.75 --profile minimal && rustup default 1.75
      - uses: Swatinem/rust-cache@v2
      - name: Test on MSRV
        run: cargo test --all-targets

  # The crate's headline trust story is "zero runtime dependencies"; this
  # substantiates it end-to-end by checking that the dev-dependency
  # (`regex`, used only by tests/benches) and the fuzz crate's dependencies
  # stay free of published RustSec advisories.
  audit:
    name: Security audit (cargo-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Audit main crate (dev-dependencies)
        run: cargo audit
      # fuzz/Cargo.lock isn't committed (fuzz/.gitignore, standard for
      # cargo-fuzz crates) — generate it fresh before auditing.
      - name: Generate fuzz lockfile
        run: cargo generate-lockfile --manifest-path fuzz/Cargo.toml
      - name: Audit fuzz crate
        run: cargo audit --file fuzz/Cargo.lock

  # Catches UB-adjacent logic bugs (out-of-bounds slicing, invalid char
  # boundaries) that pass under the normal test runner. Scoped to `--lib`
  # only: the integration suite (tests/matching.rs) times a linear-time
  # guarantee against wall-clock thresholds that don't hold under Miri's
  # interpreter overhead, and tests/differential.rs shells out to bash,
  # which Miri doesn't support — both would need restructuring to run
  # meaningfully under Miri, so this stays scoped to what already does.
  miri:
    name: Miri (lib)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install Miri
        run: |
          rustup toolchain install nightly --component miri
          rustup default nightly
      - uses: Swatinem/rust-cache@v2
      - name: Run Miri on lib tests
        run: cargo miri test --lib

  fuzz:
    name: Fuzz (smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Install nightly Rust
        run: rustup update nightly && rustup default nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      # The fuzz crate is the only Rust the root fmt/clippy steps don't
      # see; lint it here (the components ship with the default nightly
      # profile — the add is a no-op safety net).
      - name: Lint fuzz crate
        run: |
          rustup component add rustfmt clippy
          cargo fmt --check --manifest-path fuzz/Cargo.toml
          cargo clippy --manifest-path fuzz/Cargo.toml --all-targets -- -D warnings
      # A short smoke run per target on every change; real coverage comes
      # from longer local runs (`cargo +nightly fuzz run <target>`,
      # unseeded so each run explores fresh input space).
      #
      # --target is pinned to the gnu triple: the prebuilt cargo-fuzz
      # binary is musl-linked and would otherwise default to the musl
      # target, where ASan is incompatible with statically linked libc.
      #
      # -seed is pinned so CI is reproducible and main stays stable:
      # unseeded runs explore randomly and can surface a new by-design
      # engine divergence on any push (as runs 29550576979 and the first
      # local run did), which reads as a broken main. New-divergence
      # hunting belongs in local unseeded runs, not on every push.
      - name: Fuzz each target briefly
        run: |
          for target in parse exec differential; do
            cargo fuzz run --target x86_64-unknown-linux-gnu "$target" -- \
              -seed=20260717 -max_total_time=60 -max_len=512
          done
