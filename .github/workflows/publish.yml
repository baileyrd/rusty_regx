# Publishes to crates.io when a version tag is pushed. Requires the
# CARGO_REGISTRY_TOKEN repository secret (Settings → Secrets → Actions;
# generate the token at https://crates.io/settings/tokens). Until that
# secret exists, a tag push fails this workflow harmlessly.
name: Publish

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup update stable && rustup default stable
      - name: Test
        run: cargo test --all-targets
      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
