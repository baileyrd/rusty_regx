# Publishes to crates.io when a version tag is pushed, and always creates
# the GitHub Release regardless of whether that publish succeeds. Requires
# the CARGO_REGISTRY_TOKEN repository secret (Settings → Secrets → Actions;
# generate the token at https://crates.io/settings/tokens); until that
# secret exists, the "Publish to crates.io" step fails, but — unlike a
# naive linear job, where a failed step skips everything after it — the
# Release still gets created, since the two are independent concerns: one
# publishes a package, the other documents a point in git history. Only a
# `Test` failure (a real problem with the tagged commit) blocks both.
name: Publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # softprops/action-gh-release needs this to create the Release.

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup update stable && rustup default stable
      - name: Test
        run: cargo test --all-targets
      - name: Publish to crates.io
        id: publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      # Extract this version's section from RELEASE_NOTES.md (from its
      # "## <version>" heading to the next "## ") for the Release body.
      #
      # Runs even if "Publish to crates.io" failed (`!cancelled()`, not the
      # job's default "only on success") — a missing/expired token or a
      # registry hiccup shouldn't also swallow the GitHub Release. Still
      # skipped if `Test` failed and never let `publish` run at all
      # (`steps.publish.outcome` is `skipped` in that case, not `failure`).
      - name: Extract release notes
        if: ${{ !cancelled() && steps.publish.outcome != 'skipped' }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## " ver " " { grab = 1; next }
            grab && /^## / { exit }
            grab { print }
          ' RELEASE_NOTES.md > /tmp/release-body.md
          test -s /tmp/release-body.md || echo "See CHANGELOG.md." > /tmp/release-body.md
      - name: Create GitHub Release
        if: ${{ !cancelled() && steps.publish.outcome != 'skipped' }}
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-body.md
