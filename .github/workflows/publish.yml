# Publishes to crates.io when a version tag is pushed. Requires the
# CARGO_REGISTRY_TOKEN repository secret (Settings → Secrets → Actions;
# generate the token at https://crates.io/settings/tokens). Until that
# secret exists, a tag push fails this workflow harmlessly.
name: Publish

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup update stable && rustup default stable
      - name: Test
        run: cargo test --all-targets
      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      # Extract this version's section from RELEASE_NOTES.md (from its
      # "## <version>" heading to the next "## ") for the Release body.
      - name: Extract release notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## " ver " " { grab = 1; next }
            grab && /^## / { exit }
            grab { print }
          ' RELEASE_NOTES.md > /tmp/release-body.md
          test -s /tmp/release-body.md || echo "See CHANGELOG.md." > /tmp/release-body.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-body.md
