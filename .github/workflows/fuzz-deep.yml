# Weekly unseeded deep fuzz. The push-CI fuzz job pins its seed so main
# stays deterministic; this workflow is where new input space actually
# gets explored. The corpus is cached run-over-run, so coverage
# accumulates. Failures here surface discoveries (usually a by-design
# engine divergence the differential filter should learn, occasionally a
# real bug) without turning pushes red.
name: Deep fuzz

on:
  schedule:
    - cron: "17 5 * * 1" # Mondays 05:17 UTC
  workflow_dispatch:

jobs:
  fuzz-deep:
    name: Deep fuzz (unseeded, cached corpus)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Install nightly Rust
        run: rustup update nightly && rustup default nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: Restore corpus
        uses: actions/cache@v4
        with:
          path: fuzz/corpus
          key: fuzz-corpus-${{ github.run_id }}
          restore-keys: fuzz-corpus-
      - name: Fuzz each target for 10 minutes
        run: |
          for target in parse exec differential; do
            cargo fuzz run --target x86_64-unknown-linux-gnu "$target" -- \
              -max_total_time=600 -max_len=512
          done
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts
          if-no-files-found: ignore
